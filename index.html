<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Site Validation Tool</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6fb}
header{background:#1e3d8f;color:white;padding:14px;font-size:18px}
.container{padding:14px;max-width:1200px;margin:auto}
.card{background:white;padding:16px;margin-bottom:14px;border-radius:8px;border:1px solid #ddd}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
input,select,textarea{width:100%;padding:8px;border-radius:6px;border:1px solid #ccc}
textarea{height:60px}
.sectionHeader{background:#eef2ff;padding:8px;border-radius:6px;margin-top:14px;font-weight:bold}
button{padding:10px 16px;border:none;background:#1e3d8f;color:white;border-radius:6px;margin:4px;cursor:pointer}
.roomTab{display:inline-block;padding:8px 12px;border:1px solid #ccc;margin:3px;border-radius:6px;cursor:pointer}
.question{margin-bottom:10px}
</style>
</head>

<body>

<header>Site Validation Tool</header>

<div class="container">

<div class="card">
<h3>Preliminary Project Details</h3>

<div class="grid">

<input placeholder="PID">
<input placeholder="Cx Name">
<input placeholder="City">
<input placeholder="Address">
<input placeholder="Society Name">
<input placeholder="Flat No">
<input placeholder="Floor No">

<select>
<option>BHK</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
</select>

<select>
<option>Property Type</option>
<option>Bare shell</option>
<option>Builder finished</option>
<option>Resale</option>
</select>

<select>
<option>Service lift available?</option>
<option>Yes</option>
<option>No</option>
</select>

<input placeholder="Service lift size">

<select>
<option>Passenger lift available?</option>
<option>Yes</option>
<option>No</option>
</select>

<select>
<option>Service lift usage allowed?</option>
<option>Heavy material movement allowed</option>
<option>Heavy material movement Not allowed</option>
</select>

<select>
<option>Debris loading area</option>
<option>Within 30 ft</option>
<option>More than 30 ft</option>
<option>Not present</option>
</select>

<select>
<option>Debris dumping allowed?</option>
<option>Yes</option>
<option>No</option>
</select>

<select>
<option>Vehicle entry possible?</option>
<option>Yes</option>
<option>No</option>
</select>

<textarea placeholder="Society Restrictions"></textarea>

</div>
</div>

<div class="card">
<div id="roomTabs"></div>
<button onclick="addRoom()">Add Room</button>
</div>

<div class="card" id="roomForm"></div>

</div>

<script>

const roomQuestions=[

"Is there a requirement of PCC due to leveling issues/bare shell property?",
"Existing flooring in Good condition with with proper slope/levels?",
"Can we do tile on tile installation?",
"Is there sufficient height or clearance between the existing ceiling and obstructions to accommodate the false ceiling installation? (Enter 4 corner + center measurement in comments)",
"Are there visible undulations/uneven surface on the True Ceiling?",
"Is there any evidence of water leaks or moisture damage on the existing true ceiling?",
"Are the dimensions suitable for accommodating a sliding door system?",
"Can we change the size or location of windows?",
"Are the existing windows and window frames damaged?",
"Is there a possibility to relocate from one wall to another?",
"Is there any 15 Amp power Supply present?",
"Are there plumbing issues requiring repair?",
"Are existing plumbing lines outdated?",
"Is the main inlet valve accessible?",
"Is there sufficient space for shower cubicle?",
"Is WC relocation possible?",
"Do we need damp proof treatment?",
"Do we need weather proof treatment?",
"Is there existing countertop present?",
"Are there issues with the existing false ceiling?"

]

const wallQuestions=[

"Is the wall a load-bearing wall/Mivan Construction/Sheer wall? (Enter undulation measurement in comments)",
"Is the wall dry wall/Gypsum wall? (Enter undulation measurement in comments)",
"Are there major cracks requiring structural repair? (Enter measurement in comments)",
"Does the existing wall surface have undulations requiring leveling? (Enter measurement in comments)",
"Are the undulations more than 6 mm? (Enter measurement in comments)",
"Are there minor cracks requiring re plastering?",
"Is core cut location available?",
"Are existing switch/socket working?",
"Can we reuse existing switch board?",
"Can split AC be installed post false ceiling?",
"Is AC panelling required?",
"Are there darker shades on wall?",
"Is existing paint condition good?",
"Do we need to remove skirting for wardrobe?"

]

const defaultRooms=["Living Room","Kitchen","Bedroom 1","Bedroom 2","Bathroom 1","Bathroom 2","Balcony"]

let roomOrder=[...defaultRooms]

function renderTabs(){
let html=""
roomOrder.forEach(r=>{
html+=`<span class="roomTab" onclick="openRoom('${r}')">${r}</span>`
})
document.getElementById("roomTabs").innerHTML=html
}

function openRoom(room){

let html=`<h3>${room}</h3>`

html+=`<div class="sectionHeader">Room Questions</div>`

roomQuestions.forEach(q=>{
html+=`
<div class="question">
<label>${q}</label>
<select>
<option></option>
<option>Yes</option>
<option>No</option>
</select>
<textarea placeholder="Add Comments"></textarea>
</div>`
})

html+=`<div class="sectionHeader">Wall Questions</div>`

wallQuestions.forEach(q=>{
html+=`
<div class="question">
<label>${q}</label>
<select>
<option></option>
<option>Yes</option>
<option>No</option>
</select>
<select multiple>
<option>NW</option>
<option>EW</option>
<option>SW</option>
<option>WW</option>
</select>
<textarea placeholder="Add Comments"></textarea>
</div>`
})

document.getElementById("roomForm").innerHTML=html

}

function addRoom(){
let name=prompt("Room name")
if(!name)return
roomOrder.push(name)
renderTabs()
}

renderTabs()
openRoom(defaultRooms[0])

</script>

</body>
</html>
