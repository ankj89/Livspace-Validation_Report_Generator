<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Site Validation Tool</title>

<style>

body{font-family:Arial;margin:0;background:#f4f6fb}

header{
background:#1e3d8f;
color:white;
padding:14px;
font-size:18px
}

.container{
padding:14px;
max-width:1400px;
margin:auto
}

.card{
background:white;
padding:16px;
margin-bottom:14px;
border-radius:8px;
border:1px solid #ddd
}

.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:14px
}

@media(max-width:900px){
.grid{grid-template-columns:1fr}
}

.field label{
font-size:13px;
font-weight:bold;
display:block;
margin-bottom:4px
}

input,select,textarea{
width:100%;
padding:9px;
border-radius:6px;
border:1px solid #ccc
}

textarea{
height:70px
}

textarea::placeholder{
color:#aaa
}

button{
padding:11px 16px;
border:none;
background:#1e3d8f;
color:white;
border-radius:6px;
margin:4px;
cursor:pointer
}

.roomNav{
margin-bottom:10px
}

.roomTab{
display:inline-block;
padding:9px 14px;
border:1px solid #ccc;
margin:4px;
border-radius:6px;
cursor:pointer
}

.sectionHeader{
background:#eef2ff;
padding:8px;
border-radius:6px;
margin-top:14px;
font-weight:bold
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:12px
}

table th,table td{
border:1px solid #ddd;
padding:4px;
text-align:center
}

.question{
margin-bottom:12px
}

.roomNavigation{
margin-top:20px;
display:flex;
justify-content:space-between
}

</style>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body>

<header>Site Validation Tool</header>

<div class="container">

<div class="card">

<h3>Preliminary Project Details</h3>

<div class="grid">

<div class="field"><label>PID</label><input id="pid"></div>
<div class="field"><label>Cx name</label><input id="cx"></div>
<div class="field"><label>City</label><input id="city"></div>
<div class="field"><label>Address</label><input id="address"></div>
<div class="field"><label>Society Name</label><input id="society"></div>
<div class="field"><label>Flat no</label><input id="flat"></div>
<div class="field"><label>Floor No</label><input id="floorNo"></div>

<div class="field">
<label>BHK</label>
<select id="bhk">
<option></option>
<option>1 BHK</option>
<option>2 BHK</option>
<option>3 BHK</option>
<option>4 BHK</option>
</select>
</div>

<div class="field">
<label>Property type</label>
<select id="propertyType">
<option></option>
<option>Bare shell</option>
<option>Builder finished</option>
<option>Resale</option>
</select>
</div>

<div class="field">
<label>Will Cx stay in property during execution?</label>
<select id="cxStay">
<option></option>
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="field">
<label>Work Timings / Exceptions</label>
<input id="workTiming">
</div>

</div>

</div>

<div class="card roomNav">
<div id="roomTabs"></div>
<button onclick="addRoom()">Add Room</button>
</div>

<div class="card" id="roomForm"></div>

<div class="card">
<button onclick="generateExcel()">Generate Excel</button>
<button onclick="generateFullSample()">Generate Full Sample Validation</button>
<button onclick="clearAllData()">Clear All Data</button>
</div>

</div>

<script>

const walls=["NW","EW","SW","WW"]
const modules=["1M","2M","3M","4M","6M","8M","10M","12M","AC Point","Fan"]

const defaultRooms=[
"Living Room","Kitchen","Bedroom 1","Bedroom 2","Bathroom 1","Bathroom 2","Balcony"
]

const roomQuestions=[

"Is there a requirement of PCC due to leveling issues/bare shell property?",
"Existing flooring in Good condition with with proper slope/levels?",
"Can we do tile on tile installation?",
"Is there sufficient height or clearance between the existing ceiling and any obstructions (such as beams, HVAC systems, or lighting fixtures) to accommodate the false ceiling installation?",
"Are there visible undulations/uneven surface on the True Ceiling?",
"Is there any evidence of water leaks or moisture damage on the existing true ceiling?",
"Are the dimensions of the space suitable for accommodating a sliding door system?",
"Can we changes to the size, shape, or location of the windows?",
"Are the existing windows and window frames in poor condition, damaged, rot, instability etc",
"Is there a possibility to relocate from one wall to another?",
"Is there any 15 Amp power Supply present in the room?",
"Are there any issues with the existing plumbing lines, such as leaks, corrosion, blockages, or inadequate capacity, that require replacement or repair?",
"Are existing plumbing lines old and outdated and may not be compatible with modern fixtures?",
"Is the main inlet valve accesible?",
"Is there sufficent space to provide Shower cubicle?",
"Is it possible to relocate the WC, without any modifications to external pipeline/drain line?",
"Do we need to provide damp proof treament on walls?",
"Do we need to provide weather proof treatment on walls which are exposed to external atmosphere?",
"Is there existing countertop present?",
"Are there any issues with the existing false ceiling, such as damage, sagging, or instability, that require removal and replacement?"

]

const wallQuestions=[

"Is the wall a load-bearing wall/Mivan Construction/Sheer wall?",
"Is the wall dry wall/Gypsum wall?",
"Are there major cracks that require structural repair?",
"Does the existing wall surface have undulations or uneven surface, requiring leveling?",
"Are the undulation more than 6 mm?",
"Are there minor cracks/loose plaster requiring re plastering??",
"Is there suitable location for core cut available?",
"Are existing switch/socket in working condition?",
"Can we re-use the existing module/switch board?",
"Can split AC be installed post false ceiling w/o pockets?",
"Is panelling/pelmet required to be done for AC installation?",
"Are there any darker shade on the wall?",
"Is the existing paint in good condition, without excessive peeling, flaking, or bubbling?",
"Do we need to remove skirting for wardrobe installlation?"

]

let data={rooms:{}}
let roomOrder=[...defaultRooms]
let currentRoomIndex=0

function init(){

defaultRooms.forEach(r=>{
data.rooms[r]={
measurements:{ceiling:{},diagonal:{},wallDeviation:{}},
electrical:{},
room:{},
walls:{}
}
})

renderTabs()
openRoom(roomOrder[0])

}

function renderTabs(){

let html=""

roomOrder.forEach(r=>{
html+=`<span class="roomTab" onclick="openRoom('${r}')">${r}</span>`
})

document.getElementById("roomTabs").innerHTML=html

}

function addRoom(){

let name=prompt("Room name")

if(!name)return

roomOrder.push(name)

data.rooms[name]={measurements:{ceiling:{},diagonal:{},wallDeviation:{}},electrical:{},room:{},walls:{}}

renderTabs()

}

function openRoom(room){

currentRoomIndex=roomOrder.indexOf(room)

let html=`<h3>${room}</h3>`

html+=`<div class="sectionHeader">Floor to Ceiling Measurement</div>

<div class="grid">
<input placeholder="NW Corner" oninput="saveMeasure('${room}','ceiling','NW',this.value)">
<input placeholder="NE Corner" oninput="saveMeasure('${room}','ceiling','NE',this.value)">
<input placeholder="SW Corner" oninput="saveMeasure('${room}','ceiling','SW',this.value)">
<input placeholder="SE Corner" oninput="saveMeasure('${room}','ceiling','SE',this.value)">
<input placeholder="Center" oninput="saveMeasure('${room}','ceiling','Center',this.value)">
</div>`

html+=`<div class="sectionHeader">Room Diagonal Measurement</div>

<div class="grid">
<input placeholder="Diagonal 1" oninput="saveMeasure('${room}','diagonal','D1',this.value)">
<input placeholder="Diagonal 2" oninput="saveMeasure('${room}','diagonal','D2',this.value)">
</div>`

html+=`<div class="sectionHeader">Wall Deviation Measurement</div>

<div class="grid">
<input placeholder="NW Wall" oninput="saveMeasure('${room}','wallDeviation','NW',this.value)">
<input placeholder="EW Wall" oninput="saveMeasure('${room}','wallDeviation','EW',this.value)">
<input placeholder="SW Wall" oninput="saveMeasure('${room}','wallDeviation','SW',this.value)">
<input placeholder="WW Wall" oninput="saveMeasure('${room}','wallDeviation','WW',this.value)">
</div>`

html+=`<div class="sectionHeader">Electrical Modules</div><table><tr><th>Wall</th>`

modules.forEach(m=>{html+=`<th>${m}</th>`})

html+=`</tr>`

walls.forEach(w=>{
html+=`<tr><td>${w}</td>`
modules.forEach(m=>{
html+=`<td><input oninput="saveElec('${room}','${w}','${m}',this.value)"></td>`
})
html+=`</tr>`
})

html+=`</table>`

html+=`<div class="sectionHeader">Room Questions</div>`

roomQuestions.forEach(q=>{
html+=`
<div class="question">
<label>${q}</label>
<select oninput="saveRoom('${room}','${q}',this.value)">
<option></option>
<option>Yes</option>
<option>No</option>
</select>
<textarea placeholder="Add Comments" oninput="saveRoomComment('${room}','${q}',this.value)"></textarea>
</div>`
})

html+=`<div class="sectionHeader">Wall Questions</div>`

wallQuestions.forEach(q=>{
html+=`
<div class="question">
<label>${q}</label>
<select oninput="saveWall('${room}','${q}','answer',this.value)">
<option></option>
<option>Yes</option>
<option>No</option>
</select>
<select multiple oninput="saveWallWalls('${room}','${q}',this)">
<option>NW</option>
<option>EW</option>
<option>SW</option>
<option>WW</option>
</select>
<textarea placeholder="Add Comments" oninput="saveWall('${room}','${q}','comment',this.value)"></textarea>
</div>`
})

html+=`
<div class="roomNavigation">
<button onclick="prevRoom()">Previous Room</button>
<button onclick="nextRoom()">Next Room</button>
</div>
`

document.getElementById("roomForm").innerHTML=html

}

function prevRoom(){
if(currentRoomIndex>0)openRoom(roomOrder[currentRoomIndex-1])
}

function nextRoom(){
if(currentRoomIndex<roomOrder.length-1)openRoom(roomOrder[currentRoomIndex+1])
}

function saveMeasure(room,type,key,val){
data.rooms[room].measurements[type][key]=val
}

function saveElec(room,wall,module,value){
if(!data.rooms[room].electrical[wall])data.rooms[room].electrical[wall]={}
data.rooms[room].electrical[wall][module]=value
}

function saveRoom(room,q,value){
if(!data.rooms[room].room[q])data.rooms[room].room[q]={}
data.rooms[room].room[q].answer=value
}

function saveRoomComment(room,q,value){
data.rooms[room].room[q].comment=value
}

function saveWall(room,q,type,value){
if(!data.rooms[room].walls[q])data.rooms[room].walls[q]={}
data.rooms[room].walls[q][type]=value
}

function saveWallWalls(room,q,e){
let s=[...e.selectedOptions].map(o=>o.value)
data.rooms[room].walls[q].walls=s
}

function generateExcel(){

let rows=[]

const project={
PID:pid.value,
CxName:cx.value,
City:city.value,
Address:address.value,
Society:society.value,
FlatNo:flat.value,
FloorNo:floorNo.value,
BHK:bhk.value,
PropertyType:propertyType.value
}

Object.keys(data.rooms).forEach(room=>{

let r=data.rooms[room]

Object.entries(r.measurements.ceiling).forEach(([k,v])=>{
rows.push({...project,Room:room,Section:"Ceiling Measurement",Item:k,Answer:v})
})

Object.entries(r.measurements.diagonal).forEach(([k,v])=>{
rows.push({...project,Room:room,Section:"Room Diagonal",Item:k,Answer:v})
})

Object.entries(r.measurements.wallDeviation).forEach(([k,v])=>{
rows.push({...project,Room:room,Section:"Wall Deviation",Item:k,Answer:v})
})

Object.entries(r.electrical).forEach(([wall,val])=>{
Object.entries(val).forEach(([module,count])=>{
rows.push({...project,Room:room,Section:"Electrical",Wall:wall,Item:module,Answer:count})
})
})

Object.entries(r.room).forEach(([q,v])=>{
rows.push({...project,Room:room,Section:"Room Question",Item:q,Answer:v.answer,Comment:v.comment})
})

Object.entries(r.walls).forEach(([q,v])=>{
rows.push({...project,Room:room,Section:"Wall Question",Wall:(v.walls||[]).join(","),Item:q,Answer:v.answer,Comment:v.comment})
})

})

let wb=XLSX.utils.book_new()
XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),"Validation Data")
XLSX.writeFile(wb,"site_validation.xlsx")

}

function generateFullSample(){

Object.keys(data.rooms).forEach(room=>{

walls.forEach(w=>{
modules.forEach(m=>{
saveElec(room,w,m,Math.floor(Math.random()*3))
})
})

roomQuestions.forEach(q=>{
data.rooms[room].room[q]={answer:"Yes",comment:"ABCD"}
})

wallQuestions.forEach(q=>{
data.rooms[room].walls[q]={answer:"Yes",walls:["NW"],comment:"ABCD"}
})

})

alert("Full sample validation generated")

}

function clearAllData(){
location.reload()
}

init()

</script>

</body>
</html>
