<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Validation Report Generator</title>

<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px}
.card{background:#fff;padding:20px;border-radius:10px;max-width:650px;margin:auto}
button{padding:10px 16px;background:#1e3d8f;color:white;border:none;border-radius:6px;margin-top:10px;cursor:pointer;margin-right:8px}
.section{margin-top:30px;page-break-before:always}
.section:first-child{page-break-before:auto}
.logo{font-size:22px;font-weight:bold;margin-bottom:20px}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #ccc;padding:8px}
th{background:#1e3d8f;color:#fff;font-weight:bold}
.header{background:#eef2ff;font-weight:bold}
.hidden{display:none}
</style>
</head>

<body>

<div class="card">
<h2>Validation Report Generator</h2>
<input type="file" id="fileInput" accept=".xlsx" />
<br>
<button id="generateBtn">Generate Report</button>
<button id="saveBtn" class="hidden">Save Insights</button>
<button id="resetBtn">Reset</button>
<div id="postFinalize" class="hidden">
<button id="pdfBtn">Download PDF</button>
<button id="excelBtn">Download Excel</button>
<button id="editBtn">Edit Insights</button>
</div>
</div>

<div id="reportPreview"></div>

<script>

var insightsData = [];
var measData = [];
var matrixDataRaw = [];
var projectDataRaw = {};
var societyData = [];

function norm(str){return (str||"").toLowerCase().replace(/[^a-z0-9]/g,"");}

/* ---------------- RULE ENGINE CONFIG ---------------- */
const RULES = [
{
id:"RCC_WALL",
type:"wall",
condition:{itemIncludes:"load-bearing",valueEquals:"yes"},
output:(matches)=>{
let walls = matches.map(m=>m.Walls).filter(Boolean);
return `RCC walls (${walls.join(", ")}) detected. No demolition or chiselling allowed. Wall panelling required for any electrical works.`;
}
},
{
id:"STRUCTURAL_CRACK",
type:"wall",
condition:{itemIncludes:"structural crack",valueEquals:"yes"},
output:(matches)=>{
let walls = matches.map(m => m.Walls).filter(Boolean);
if(!walls.length) return null;
return `Structural crack observed on walls ${walls.join(", ")}. Structural engineer intervention required.`;
}
},
{
id:"HAIRLINE_CRACK",
type:"wall",
condition:{itemIncludes:"hairline crack",valueEquals:"yes"},
output:(matches)=>{
let walls = matches.map(m => m.Walls).filter(Boolean);
if(!walls.length) return null;
return `Hairline cracks on walls ${walls.join(", ")}. Re-plastering required.`;
}
},
{
id:"WALL_SEEPAGE",
type:"wall",
condition:{itemIncludes:"water seepage",valueEquals:"yes"},
output:()=> "Wall seepage observed. Damp-proof treatment required."
},
{
id:"WIRING",
type:"room",
condition:{itemIncludes:"wiring",valueEquals:"no"},
output:()=> "Existing wiring not in good condition. Re-wiring required."
},
{
id:"SCAFFOLDING",
type:"society",
condition:{questionIncludes:"scaffold",valueEquals:"yes"},
output:()=> "Height >10 ft. Scaffolding cost applicable."
},
{
id:"VEHICLE_NONE",
type:"society",
condition:{questionIncludes:"vehicle",valueEquals:"no"},
output:()=> "Vehicle entry not allowed. Long lead charges applicable."
},
{
id:"LOADING_DISTANCE_FAR",
type:"society",
condition:{questionIncludes:"loading",valueEquals:"more than 30"},
output:()=> "Loading distance >30 ft. Long lead charges applicable."
},
{
id:"ROOM_DIAGONAL",
type:"measurement",
condition:{fields:["diag1","diag2"]},
output:(vals)=>{
let nums=vals.map(Number).filter(v=>!isNaN(v)&&v!==0);
if(nums.length<2) return null;
let diff=Math.abs(nums[0]-nums[1]);
if(diff>25) return "Room geometry deviation >25mm. Plastering required.";
if(diff>=10) return "Room geometry deviation 10–25mm. Punning required.";
return null;
}
},
{
id:"CEILING_VARIATION",
type:"measurement",
condition:{fields:["fc1","fc2","fc3","fc4","fc5"]},
output:(vals)=>{
let nums=vals.map(Number).filter(v=>!isNaN(v)&&v!==0);
if(nums.length<2) return null;
let diff=Math.max(...nums)-Math.min(...nums);
if(diff>25) return "Ceiling variation >25mm. False ceiling required.";
return null;
}
},
{
id:"SOFFIT_AC",
type:"measurement",
condition:{fields:["soffitNW","soffitEW","soffitSW","soffitWW","winSoffitNW","winSoffitEW","winSoffitSW","winSoffitWW"]},
output:(vals,m)=>{
let walls=[];
[["NW",m.soffitNW,m.winSoffitNW],["EW",m.soffitEW,m.winSoffitEW],["SW",m.soffitSW,m.winSoffitSW],["WW",m.soffitWW,m.winSoffitWW]]
.forEach(([w,a,b])=>{
if((a>0 && a<800)||(b>0 && b<800)) walls.push(w);
});
if(!walls.length) return null;
return `AC space constraint on walls ${walls.join(", ")}. False ceiling pocket required.`;
}
}
];

function runRuleEngine(rooms){
let insights=[];

RULES.forEach(rule=>{

if(rule.type==="wall"||rule.type==="room"){
rooms.forEach(room=>{
let matches=matrixDataRaw.filter(x=>
x.Room===room &&
norm(x.Item).includes(norm(rule.condition.itemIncludes)) &&
norm(x.Value||"").includes(norm(rule.condition.valueEquals))
);
if(matches.length){
let res=rule.output(matches);
if(res) insights.push({room,text:res});
}
});
}

if(rule.type==="measurement"){
measData.forEach(m=>{
if(!m.Room) return;
let vals=rule.condition.fields.map(f=>m[f]||null);
let res=rule.output(vals,m);
if(res) insights.push({room:m.Room,text:res});
});
}

if(rule.type==="society"){
societyData.forEach(s=>{
if(norm(s.Question).includes(norm(rule.condition.questionIncludes)) &&
norm(s.Value||"").includes(norm(rule.condition.valueEquals))){
let res=rule.output(s);
if(res) insights.push({room:"All",text:res});
}
});
}

});

return insights;
}

function bindEvents(){
document.getElementById("generateBtn").onclick = processFile;
document.getElementById("saveBtn").onclick = saveInsights;
document.getElementById("editBtn").onclick = enableEditing;
document.getElementById("excelBtn").onclick = downloadExcel;
document.getElementById("pdfBtn").onclick = downloadPDF;
}

function getUnique(arr,key){ return [...new Set(arr.map(x=>x[key]))]; }

function addInsightRow(){
let table=document.getElementById("insightTable");
let row=table.insertRow();
let cols=table.rows[0].cells.length;
for(let i=0;i<cols;i++){
let cell=row.insertCell();
if(i===0) cell.innerText=table.rows.length-1;
else cell.contentEditable="true";
}
}

function saveInsights(){
insightsData = [];
let table = document.getElementById("insightTable");
for(let i=1;i<table.rows.length;i++){
let row = table.rows[i];
let rowData = [];
for(let j=1;j<row.cells.length;j++){
rowData.push(row.cells[j].innerText.trim());
}
insightsData.push(rowData);
}

document.querySelectorAll("#insightTable td").forEach(td => td.removeAttribute("contenteditable"));

document.getElementById("saveBtn").classList.add("hidden");
document.getElementById("postFinalize").classList.remove("hidden");

alert("Insights saved successfully");
}

function enableEditing(){
document.querySelectorAll("#insightTable td").forEach(td => td.setAttribute("contenteditable","true"));
document.getElementById("saveBtn").classList.remove("hidden");
document.getElementById("postFinalize").classList.add("hidden");
}

function downloadExcel(){
let ws = XLSX.utils.aoa_to_sheet(insightsData);
let wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "Insights");
XLSX.writeFile(wb, "Insights.xlsx");
}

function downloadPDF(){
let printContent = document.getElementById("reportContainer").innerHTML;
let win = window.open('', '', 'height=700,width=900');
win.document.write('<html><body>'+printContent+'</body></html>');
win.document.close();
win.print();
}

function processFile(){
let file=document.getElementById("fileInput").files[0];
if(!file){alert("Upload file first");return;}

let reader=new FileReader();
reader.onload=function(e){
let wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});

matrixDataRaw=XLSX.utils.sheet_to_json(wb.Sheets["Validation Data"]||{});
measData=XLSX.utils.sheet_to_json(wb.Sheets["Measurements"]||{});
societyData=XLSX.utils.sheet_to_json(wb.Sheets["Society Constraints"]||{});

let rooms=getUnique(matrixDataRaw,"Room");

let html='<div id="reportContainer"><div class="logo">SITE VALIDATION REPORT</div>';

/* PROJECT */
html+='<div class="section"><h2>Project Details</h2><table><tr><th>Field</th><th>Value</th></tr>';
let projectData = matrixDataRaw[0] || {};
for(let k in projectData){
if(!["Room","Section","Item","Value","Walls"].includes(k)){
html+=`<tr><td>${k}</td><td>${projectData[k]}</td></tr>`;
}}
html+='</table></div>';

/* SOCIETY */
if(societyData.length){
html+='<div class="section"><h2>Society Constraints</h2><table><tr><th>Question</th><th>Value</th></tr>';
let grouped={};
societyData.forEach(s=>{let cat=s.Category||"General";if(!grouped[cat]) grouped[cat]=[];grouped[cat].push(s);});
for(let cat in grouped){
html+=`<tr class="header"><td colspan="2">${cat}</td></tr>`;
grouped[cat].forEach(i=>html+=`<tr><td>${i.Question}</td><td>${i.Value||""}</td></tr>`);
}
html+='</table></div>';
}

/* MATRIX */
html+='<div class="section"><h2>Validation Matrix</h2><table><tr><th>Question</th>';
rooms.forEach(r=>html+=`<th>${r}</th>`);
html+='</tr>';
let qs=getUnique(matrixDataRaw,"Item");
qs.forEach(q=>{
html+=`<tr><td>${q}</td>`;
rooms.forEach(r=>{
let rec=matrixDataRaw.find(x=>x.Room===r&&x.Item===q)||{};
let val=rec.Value||"";
if(rec.Walls) val+=` (${rec.Walls})`;
html+=`<td>${val}</td>`;
});
html+='</tr>';
});
html+='</table></div>';

/* INSIGHTS */
let autoInsights=runRuleEngine(rooms);
let roomInsights={}; let societyInsights=[];
rooms.forEach(r=>roomInsights[r]=[]);

autoInsights.forEach(i=>{
if(i.room==="All") societyInsights.push(i.text);
else roomInsights[i.room].push(i.text);
});

html+='<div class="section"><h2>Insights</h2>';
html+='<button onclick="addInsightRow()">+ Add Row</button>';
html+='<table id="insightTable"><tr><th>SNo</th><th>Society</th>';
rooms.forEach(r=>html+=`<th>${r}</th>`);
html+='</tr>';

let maxRows=Math.max(societyInsights.length,...Object.values(roomInsights).map(a=>a.length),5);
for(let i=0;i<maxRows;i++){
html+=`<tr><td>${i+1}</td>`;
html+=`<td contenteditable="true">${societyInsights[i]||""}</td>`;
rooms.forEach(r=>{
let txt=roomInsights[r][i]||"";
html+=`<td contenteditable="true">${txt}</td>`;
});
html+='</tr>';
}

html+='</table></div></div>';

document.getElementById("reportPreview").innerHTML=html;
document.getElementById("saveBtn").classList.remove("hidden");
};
reader.readAsArrayBuffer(file);
}

document.addEventListener("DOMContentLoaded",bindEvents);

</script>

</body>
</html>
