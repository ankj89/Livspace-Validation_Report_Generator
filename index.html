function norm(str){return (str||"").toLowerCase().replace(/[^a-z0-9]/g,"");}
function classifyInsight(text){

let t = (text || "").toLowerCase();

/* TYPE */
let type = "";

if(t.includes("design") || t.includes("suggested") || t.includes("recommended")){
type = "Design Input";
}
else if(t.includes("charges") || t.includes("cost") || t.includes("additional")){
type = "Cost Input";
}
else{
type = "Execution Input";
}

/* CATEGORY */
let category = "";

if(t.includes("plaster") || t.includes("civil") || t.includes("wall") || t.includes("floor")){
category = "Civil";
}
else if(t.includes("electrical") || t.includes("wiring") || t.includes("switch")){
category = "Electrical";
}
else if(t.includes("plumbing") || t.includes("water") || t.includes("drain")){
category = "Plumbing";
}
else if(t.includes("carpentry") || t.includes("wood") || t.includes("wardrobe")){
category = "Carpentry";
}
else if(t.includes("paint") || t.includes("polish")){
category = "Paint";
}
else if(t.includes("false ceiling") || t.includes("ceiling")){
category = "False Ceiling";
}
else{
category = "";
}

return {type, category};

}

function runRuleEngine(rooms){
let insights=[];

RULES.forEach(rule=>{

if(rule.type==="wall"||rule.type==="room"){
rooms.forEach(room=>{
let matches=matrixDataRaw.filter(x=>
x.Room===room &&
norm(x.Item).includes(norm(rule.condition.itemIncludes)) &&
norm(x.Value||"").includes(norm(rule.condition.valueEquals))
);
if(matches.length){
let res=rule.output(matches);
if(res) insights.push({room,text:res});
}
});
}

if(rule.type==="measurement"){
measData.forEach(m=>{
if(!m.Room) return;
let vals=rule.condition.fields.map(f=>m[f]||null);
let res=rule.output(vals,m);
if(res) insights.push({room:m.Room,text:res});
});
}

if(rule.type==="society"){
societyData.forEach(s=>{

/* QUESTION MATCH (MANDATORY) */
if(!norm(s.Question).includes(norm(rule.condition.questionIncludes))) return;

/* VALUE MATCH (ONLY IF PRESENT) */
if(rule.condition.valueEquals){
if(!norm(s.Value||"").includes(norm(rule.condition.valueEquals))) return;
}

/* RUN RULE */
let res = rule.output(s);
if(res) insights.push({room:"All",text:res});

});
}

});

return insights;
}

function bindEvents(){
document.getElementById("generateBtn").onclick = processFile;
document.getElementById("saveBtn").onclick = saveInsights;
document.getElementById("editBtn").onclick = enableEditing;
document.getElementById("excelBtn").onclick = downloadExcel;
document.getElementById("pdfBtn").onclick = downloadPDF;
}

function getUnique(arr,key){ return [...new Set(arr.map(x=>x[key]))]; }

function addInsightRow(tableId){

let table = document.getElementById(tableId);
if(!table) return;

let row = table.insertRow();
let rowCount = table.rows.length - 1;

/* SNo */
let cell0 = row.insertCell(0);
cell0.innerText = rowCount;

/* Other columns */
for(let i=1;i<5;i++){
let cell = row.insertCell(i);
cell.contentEditable = "true";
cell.innerText = "";
}
}
function saveInsights(){

insightsData = [];

let tables = document.querySelectorAll("table");

tables.forEach(table=>{

if(!table.id || !table.id.includes("Table")) return;

for(let i=1;i<table.rows.length;i++){

let row = table.rows[i];
let rowData = [];

for(let j=1;j<row.cells.length;j++){
rowData.push(row.cells[j].innerText.trim());
}

insightsData.push(rowData);

}

});

/* LOCK */
document.querySelectorAll("table[id*='Table'] td")
.forEach(td => td.removeAttribute("contenteditable"));

document.getElementById("saveBtn").classList.add("hidden");
document.getElementById("postFinalize").classList.remove("hidden");

alert("Insights saved successfully");
}
function enableEditing(){

document.querySelectorAll("table[id*='Table'] td")
.forEach(td => td.setAttribute("contenteditable","true"));

document.getElementById("saveBtn").classList.remove("hidden");
document.getElementById("postFinalize").classList.add("hidden");
}

function downloadExcel(){
let ws = XLSX.utils.aoa_to_sheet(insightsData);
let wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "Insights");
XLSX.writeFile(wb, "Insights.xlsx");
}

function downloadPDF(){

let content = document.getElementById("reportContainer").innerHTML;

let styles = document.querySelector("style").outerHTML;

let win = window.open('', '', 'height=700,width=900');

win.document.write(`
<html>
<head>${styles}</head>
<body>${content}</body>
</html>
`);

win.document.close();
win.print();

}

function processFile(){
let file=document.getElementById("fileInput").files[0];
if(!file){alert("Upload file first");return;}

let reader=new FileReader();
reader.onload=function(e){
let wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});

matrixDataRaw=XLSX.utils.sheet_to_json(wb.Sheets["Validation Data"]||{});
measData=XLSX.utils.sheet_to_json(wb.Sheets["Measurements"]||{});
societyData=XLSX.utils.sheet_to_json(wb.Sheets["Society Constraints"]||{});

let rooms=getUnique(matrixDataRaw,"Room");

let html='<div id="reportContainer"><div class="logo">SITE VALIDATION REPORT</div>';

/* PROJECT */
html+='<div class="section"><h2>Project Details</h2><table><tr><th>Field</th><th>Value</th></tr>';
let projectData = matrixDataRaw[0] || {};
for(let k in projectData){
if(!["Room","Section","Item","Value","Walls"].includes(k)){
html+=`<tr><td>${k}</td><td>${projectData[k]}</td></tr>`;
}}
html+='</table></div>';

/* SOCIETY */
if(societyData.length){
html+='<div class="section"><h2>Society Constraints</h2><table><tr><th>Question</th><th>Value</th></tr>';
let grouped={};
societyData.forEach(s=>{let cat=s.Category||"General";if(!grouped[cat]) grouped[cat]=[];grouped[cat].push(s);});
for(let cat in grouped){
html+=`<tr class="header"><td colspan="2">${cat}</td></tr>`;
grouped[cat].forEach(i=>html+=`<tr><td>${i.Question}</td><td>${i.Value||""}</td></tr>`);
}
html+='</table></div>';
}

/* MATRIX */
html+='<div class="section"><h2>Validation Matrix</h2><table><tr><th>Question</th>';
rooms.forEach(r=>html+=`<th>${r}</th>`);
html+='</tr>';
let qs=getUnique(matrixDataRaw,"Item");
qs.forEach(q=>{
html+=`<tr><td>${q}</td>`;
rooms.forEach(r=>{
let rec=matrixDataRaw.find(x=>x.Room===r&&x.Item===q)||{};
let val=rec.Value||"";
if(rec.Walls) val+=` (${rec.Walls})`;
html+=`<td>${val}</td>`;
});
html+='</tr>';
});
html+='</table></div>';

/* INSIGHTS */
/* ================= INSIGHTS ================= */

let autoInsights = runRuleEngine(rooms);

/* SPLIT */
let roomInsights = {};
let societyInsights = [];

rooms.forEach(r => roomInsights[r] = []);

autoInsights.forEach(i=>{
if(i.room === "All") societyInsights.push(i.text);
else roomInsights[i.room].push(i.text);
});

/* 🔷 HELPER */
function createInsightTable(title, dataArr, tableId){

let html = `<div class="section">
<h2>${title}</h2>

<button onclick="addInsightRow('${tableId}')">+ Add Row</button>

<table id="${tableId}">
<tr>
<th>SNo</th>
<th>Insights</th>
<th>Type of Insight</th>
<th>Category</th>
<th style="width:30%">Remarks</th>
</tr>`;

let rows = Math.max(dataArr.length, 5);

for(let i=0;i<rows;i++){

let txt = dataArr[i] || "";
let meta = classifyInsight(txt);

/* COLOR */
let rowClass = "";
if(meta.type === "Design Input") rowClass = "type-design";
else if(meta.type === "Cost Input") rowClass = "type-cost";
else rowClass = "type-execution";

/* HTML */
html += `<tr class="${rowClass}">
<td>${i+1}</td>
<td contenteditable="true">${txt}</td>
<td contenteditable="true">${meta.type}</td>
<td contenteditable="true">${meta.category}</td>
<td contenteditable="true" style="min-width:200px"></td>
</tr>`;

}

html += `</table></div>`;

return html;
}

/* SOCIETY */
html += createInsightTable("Society Insights", societyInsights, "societyTable");

/* ROOMS */
rooms.forEach((room, index)=>{
html += createInsightTable(`${room} Insights`, roomInsights[room], `roomTable_${index}`);
});

document.getElementById("reportPreview").innerHTML=html;
document.getElementById("saveBtn").classList.remove("hidden");
};
