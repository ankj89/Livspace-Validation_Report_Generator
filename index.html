<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Validation Report Generator1</title>

<!-- ✅ FIX 1: Stable CDN -->
<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px}
.card{background:#fff;padding:20px;border-radius:10px;max-width:600px;margin:auto}
button{padding:10px 16px;background:#1e3d8f;color:white;border:none;border-radius:6px;margin-top:10px;cursor:pointer}
</style>
</head>

<body>

<div class="card">
<h2>Validation Report Generator 1.0</h2>

<input type="file" id="fileInput" accept=".xlsx" />
<br>
<button id="generateBtn">Generate Report</button>
<button id="pdfBtn">Download PDF</button>
  
</div>

<script>

window.onerror = function(msg, url, line){
alert("JS Error: " + msg + " at line " + line)
}

let globalReportHTML = ""  // for PDF

function processFile(){

let file = document.getElementById("fileInput").files[0]
if(!file){ alert("Upload file first"); return }

let reader = new FileReader()

reader.onload = function(e){

try{

let data = new Uint8Array(e.target.result)
let wb = XLSX.read(data, {type:'array'})

let rawSheet = wb.Sheets["Validation Data"] || wb.Sheets[wb.SheetNames[0]]
let measSheet = wb.Sheets["Measurements"] || wb.Sheets[wb.SheetNames[1]]

let raw = XLSX.utils.sheet_to_json(rawSheet)
let meas = measSheet ? XLSX.utils.sheet_to_json(measSheet) : []

let rooms = [...new Set(raw.map(r=>r.Room))]

/* ---------------- PROJECT ---------------- */

let project = raw[0] || {}

/* ---------------- BUILD HTML REPORT ---------------- */

let html = `
<div id="reportContainer">

<div class="logo">SITE VALIDATION REPORT</div>

<div class="section">
<h2>Project & Society</h2>
<table>
<tr><th>Parameter</th><th>Value</th></tr>
`

Object.keys(project).forEach(k=>{
if(!["Room","Section","Item","Value"].includes(k)){
html += `<tr><td>${k}</td><td>${project[k]}</td></tr>`
}
})

html += `</table></div>`

/* ---------------- VALIDATION MATRIX ---------------- */

html += `<div class="section"><h2>Validation Matrix</h2><table>`

html += `<tr><th>Question</th>`
rooms.forEach(r=>html+=`<th>${r}</th>`)
html += `</tr>`

let wallRows = raw.filter(r=>r.Section==="Wall")
let wallQuestions = [...new Set(wallRows.map(r=>r.Item))]

html += `<tr class="header"><td colspan="${rooms.length+1}">WALL VALIDATION</td></tr>`

wallQuestions.forEach(q=>{
html += `<tr><td>${q}</td>`
rooms.forEach(room=>{
let rec = wallRows.find(r=>r.Room===room && r.Item===q)
let val = rec ? [rec.Walls,rec.Value,rec.Comments].filter(x=>x).join(" | ") : ""
html += `<td>${val}</td>`
})
html += `</tr>`
})

let roomRows = raw.filter(r=>r.Section==="Room")
let roomQuestions = [...new Set(roomRows.map(r=>r.Item))]

html += `<tr class="header"><td colspan="${rooms.length+1}">ROOM VALIDATION</td></tr>`

roomQuestions.forEach(q=>{
html += `<tr><td>${q}</td>`
rooms.forEach(room=>{
let rec = roomRows.find(r=>r.Room===room && r.Item===q)
let val = rec ? [rec.Value,rec.Comments].filter(x=>x).join(" | ") : ""
html += `<td>${val}</td>`
})
html += `</tr>`
})

html += `</table></div>`

/* ---------------- INSIGHTS ---------------- */
<td contenteditable="true"></td>
html += `<div class="section"><h2>Insights</h2><table id="insightTable">`

html += `<tr><th>SNo</th>`
rooms.forEach(r=>html+=`<th>${r}</th>`)
html += `</tr>`

for(let i=1;i<=25;i++){
html += `<tr><td>${i}</td>`
rooms.forEach((r,idx)=>{
html += `<td contenteditable="true" data-room="${r}" data-row="${i}" style="height:50px"></td>`
})
html += `</tr>`
}

html += `</table></div>`

/* ---------------- MEASUREMENTS ---------------- */

html += `<div class="section"><h2>Measurements</h2><table>`

if(meas.length){
let keys = Object.keys(meas[0]).filter(k=>k!=="Room")

html += `<tr><th>Measurement</th>`
rooms.forEach(r=>html+=`<th>${r}</th>`)
html += `</tr>`

keys.forEach(k=>{
html += `<tr><td>${k}</td>`
meas.forEach(r=>{
html += `<td>${r[k]||""}</td>`
})
html += `</tr>`
})
}

html += `</table></div>`

html += `</div>`

/* STORE FOR PDF */
globalReportHTML = html

/* OPEN PREVIEW */
document.body.innerHTML = html

alert("✅ Report Ready (Use Download PDF button)")

}catch(err){
console.error(err)
alert("Error processing file")
}

}

reader.readAsArrayBuffer(file)

}

/* PDF DOWNLOAD */
function downloadPDF(){

let report = document.getElementById("reportContainer")

if(!report){
alert("Generate report first")
return
}

/* Disable editing */
report.querySelectorAll("[contenteditable]").forEach(el=>{
el.removeAttribute("contenteditable")
})

/* Clone clean content */
let content = report.outerHTML

let w = window.open()

w.document.write(`
<html>
<head>
<title>Validation Report</title>
<style>
body{font-family:Arial;padding:20px}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #000;padding:8px}
th{background:#1e3d8f;color:#fff}
.section{margin-top:30px}
.header{background:#eef2ff;font-weight:bold}
</style>
</head>
<body>
${content}
</body>
</html>
`)

setTimeout(()=>{
w.print()
},500)

}
  
function finalizeReport(){

let table = document.getElementById("insightTable")

if(!table){
alert("Generate report first")
return
}

let insightsData = []

for(let i=1;i<table.rows.length;i++){

let row = table.rows[i]
let obj = {SNo: row.cells[0].innerText}

for(let j=1;j<row.cells.length;j++){
let room = table.rows[0].cells[j].innerText
obj[room] = row.cells[j].innerText
}

insightsData.push(obj)
}

console.log("Captured Insights:", insightsData)

/* 🔥 OPTIONAL: Replace table with final static version */

alert("Insights captured ✅ Now download PDF")

}
document.addEventListener("DOMContentLoaded", ()=>{

document.getElementById("generateBtn").addEventListener("click", processFile)
document.getElementById("pdfBtn").addEventListener("click", downloadPDF)

})
</script>



</body>
</html>
