function norm(str){
return (str || "")
.toLowerCase()
.replace(/\s/g,"")   // only remove spaces
}
function getAllReports(){
return JSON.parse(localStorage.getItem("validationReports") || "{}");
}
function getReportName(){

let pid = "";
let cx = "";

/* try to read from project data */
if(matrixDataRaw.length){
pid = matrixDataRaw[0].PID || matrixDataRaw[0].Pid || "";
cx = matrixDataRaw[0]["Cx Name"] || matrixDataRaw[0].Cx || "";
}

/* fallback if not found */
pid = pid || "PID";
cx = cx || "Cx";

/* timestamp */
let now = new Date();
let ts = now.toLocaleString();

/* final */
return `${pid}_${cx} (${ts})`;

}


 
 
function saveCurrentReport(){

if(!currentReportId) return;

let allReports = getAllReports();

allReports[currentReportId] = {
matrixDataRaw,
measData,
societyData,
reportHTML: document.getElementById("reportPreview").innerHTML,
insightsData,
timestamp: new Date().toISOString()
};

localStorage.setItem("validationReports", JSON.stringify(allReports));

populateReportList();
}
 





 
function createNewReport(){

currentReportId = getReportName();

matrixDataRaw = [];
measData = [];
societyData = [];
insightsData = [];

document.getElementById("reportPreview").innerHTML = "";

saveCurrentReport();

}

function loadReport(reportId){

let allReports = getAllReports();
let data = allReports[reportId];
if(!data) return;

currentReportId = reportId;

matrixDataRaw = data.matrixDataRaw || [];
measData = data.measData || [];
societyData = data.societyData || [];
insightsData = data.insightsData || [];

document.getElementById("reportPreview").innerHTML = data.reportHTML || "";

document.getElementById("saveBtn").classList.remove("hidden");
document.getElementById("postFinalize").classList.remove("hidden");

alert("Report loaded");
}
function getTreatment(mm){

if(mm <= ORTHO_LIMITS.minor){
    return null
}

if(mm > 5 && mm <= 20){
    return "POP punning required"
}

if(mm > 20 && mm <= 30){
    return "Plastering + punning required"
}

if(mm > 30){
    return "Wall panelling required"
}

return null
}

function detectWallIssuesAdvanced(wp, walls){

let c1 = Number(wp[0].val)
let mid = Number(wp[1].val)
let c2 = Number(wp[2].val)

let issues = []

/* ---------------- MID DEVIATION (BULGE / DIP) ---------------- */

let expectedMid = (c1 + c2) / 2
let midDev = Math.abs(mid - expectedMid)

let treatmentMid = getTreatment(midDev)

if(treatmentMid){
issues.push({
wall: walls.join(", "),
deviation: Math.round(midDev),
action: treatmentMid
})
}

/* ---------------- EDGE DEVIATION (TILT) ---------------- */

let edgeDiff = Math.abs(c1 - c2)

let treatmentEdge = getTreatment(edgeDiff)

if(treatmentEdge){

/* 🔥 IDENTIFY WHICH WALL */
let problemWall = c1 > c2 ? walls[0] : walls[1]

issues.push({
wall: problemWall,
deviation: Math.round(edgeDiff),
action: treatmentEdge
})
}

return issues
}
 
function loadSelectedReport(){
let id = document.getElementById("reportList").value;
if(!id){ alert("Select report"); return; }
loadReport(id);
}

function deleteReport(){

let id = document.getElementById("reportList").value;
if(!id) return;

if(!confirm("Delete this report?")) return;

let reports = getAllReports();
delete reports[id];

localStorage.setItem("validationReports", JSON.stringify(reports));

populateReportList();

alert("Report deleted");
}
function getWallsFromRoom(matches){

let walls = matches.map(x => x.Walls).filter(w => w && w.trim() !== "")

/* 🔥 split if multiple like "E1,E2" */
let expanded = walls.flatMap(w =>
w.split(",").map(e => e.trim())
)

/* 🔥 unique */
return [...new Set(expanded)].join(", ")


}
 
function populateReportList(){

let reports = getAllReports();
let dropdown = document.getElementById("reportList");

if(!dropdown) return;

dropdown.innerHTML = "";

Object.keys(reports).forEach(id=>{
let opt = document.createElement("option");
opt.value = id;
opt.text = id;
dropdown.appendChild(opt);
});

}

output:(matches)=>{

/* ---------------- UNDULATION CHECK (UPDATED) ---------------- */

let elevs = getElevations(room)

let undulationOK = true

undulationOK = elevs.every(e=>{

let c = getWallValue(room, e, "Center")
let u = getWallValue(room, e, "Upper")

/* if no data → ignore wall */
if(!c && !u) return true

let dev = Math.abs((u || c) - c)

/* threshold same as earlier logic */
return dev <= 3

})

}

);

norm(x.Item).includes("skirting") &&
norm(x.Value).includes("no")
);

undulationOK &&
!hasPunning &&
!hasDark &&
!hasSeepage &&
!skirting
){

{
id:"CLEAR_HEIGHT_ADV",

    category:["False Ceiling"]
},

condition:{fields:["beamFloor","sprinklerFloor","utilityFloor","fc1","fc2","fc3","fc4","fc5"]},

output:(v,m)=>{

/* ---------------- BASE HEIGHT ---------------- */

let fcVals = [m.fc1,m.fc2,m.fc3,m.fc4,m.fc5]
.map(Number)
.filter(x=>x>0)

if(!fcVals.length) return null

let fcMin = Math.min(...fcVals)

let beam = Number(m.beamFloor) || 0
let sprinkler = Number(m.sprinklerFloor) || 0
let utility = Number(m.utilityFloor) || 0

/* ---------------- CONSTANTS ---------------- */

let target = 2440   // 8 ft
let minStandardDrop = 75
let serviceBuffer = 50

/* ---------------- NO CONSTRAINT CASE ---------------- */

if(!beam && !sprinkler && !utility){

    let msgs = []

    msgs.push(`Clear heights (FFL reference):`)
    msgs.push(`Slab (FC): ${fcMin} mm`)
    msgs.push(`False ceiling drop: 150 mm`)
    msgs.push(`Recommendation: False ceiling can be designed. No structural or service constraints`)

    return msgs.map(m => `• ${m}`).join("<br>")
}

/* ---------------- SERVICE ADJUSTMENT ---------------- */

let sprinklerAdj = sprinkler > 0 ? (sprinkler - serviceBuffer) : 0

/* ---------------- VALIDITY ---------------- */

let beamValid = beam > target
let sprinklerValid = sprinklerAdj > target
let utilityValid = utility > target

/* ---------------- MAX DROP ---------------- */

let maxDrop = fcMin - target
maxDrop = Math.min(maxDrop, 300)

/* ---------------- MIN DROP ---------------- */

let minDrop = minStandardDrop
let controlling = null

if(beamValid || sprinklerValid || utilityValid){

    let candidates = []

    if(beamValid){
        candidates.push({type:"beam", value:beam})
    }

    if(sprinklerValid){
        candidates.push({type:"sprinkler", value:sprinklerAdj})
    }

    if(utilityValid){
        candidates.push({type:"utility", value:utility})
    }

    let ctrl = candidates.reduce((a,b)=> a.value > b.value ? a : b)

    controlling = ctrl.type
    minDrop = fcMin - ctrl.value
}

minDrop = Math.min(minDrop, 300)

/* ---------------- CONCEALMENT LOGIC ---------------- */

let recommendation = ""

let validCount = [beamValid, sprinklerValid, utilityValid].filter(x=>x).length

if(validCount >= 2){

    if(controlling === "beam"){
        recommendation = `At minimum drop, intermediary beam can be concealed. At maximum drop beam, sprinkler & utilities can be concealed. In both scenarios, clear height will be max 8 ft`
    }
    else if(controlling === "sprinkler"){
        recommendation = `At minimum drop, services/sprinkler can be concealed. At maximum drop beam, sprinkler & utilities can be concealed. In both scenarios, clear height will be max 8 ft`
    }
    else{
        recommendation = `At minimum drop, other utilities (HVAC/VRV etc.) can be concealed. At maximum drop beam, sprinkler & utilities can be concealed. In both scenarios, clear height will be max 8 ft`
    }

}
else if(beamValid){
    recommendation = `Intermediary beam can be concealed within false ceiling while maintaining minimum 8 ft clear height`
}
else if(sprinklerValid){
    recommendation = `Services/sprinkler can be accommodated within ceiling while maintaining minimum 8 ft clear height`
}
else if(utilityValid){
    recommendation = `Other services/utilities (HVAC/VRV etc.) can be accommodated within ceiling while maintaining minimum 8 ft clear height`
}

/* ---------------- NON-CONCEAL CASE ---------------- */

let constraints = []

if(beam > 0 && !beamValid){
    constraints.push(`Intermediary beam cannot be concealed without reducing clear height below 8 ft → design false ceiling accordingly`)
}

if(sprinkler > 0 && !sprinklerValid){
    constraints.push(`Services/sprinkler cannot be concealed without reducing clear height below 8 ft → design false ceiling accordingly`)
}

if(utility > 0 && !utilityValid){
    constraints.push(`Other services/utilities cannot be concealed without reducing clear height below 8 ft → design false ceiling accordingly`)
}

/* ---------------- COST ---------------- */

let highDrop = maxDrop > 150 || minDrop > 150

/* ---------------- OUTPUT ---------------- */

let msgs = []

msgs.push(`Clear heights (FFL reference):`)
msgs.push(`Slab (FC): ${fcMin} mm`)

if(beam > 0){
    msgs.push(`Beam bottom: ${beam} mm`)
}

if(sprinkler > 0){
    msgs.push(`Services/sprinkler: ${sprinkler} mm`)
}

if(utility > 0){
    msgs.push(`Other services/utilities: ${utility} mm`)
}

if(maxDrop <= 0){
    msgs.push(`False ceiling not feasible while maintaining 8 ft clear height`)
}else{
    msgs.push(`False ceiling drop: ${minDrop} – ${maxDrop} mm`)
}

if(recommendation){
    msgs.push(`Recommendation: ${recommendation}`)
}

if(constraints.length){
    msgs.push(`Constraint: ${constraints.join(" | ")}`)
}

if(highDrop){
    msgs.push(`Please note: Any drop exceeding 150 mm there will additional cost over MRC rate`)
}

/* ---------------- FINAL ---------------- */

return msgs.map(m => `• ${m}`).join("<br>")

}
},

function runRuleEngine(rooms){
let insights=[];

RULES.forEach(rule=>{

if(rule.type==="wall"||rule.type==="room"){
rooms.forEach((rm, index)=>{
 if(typeof rm !== "string") return;

 
let matches = matrixDataRaw.filter(x=>{

    if(x.Room !== rm) return false

    if(!norm(x.Item).includes(norm(rule.condition.itemIncludes))) return false

    // 🔥 STRICT VALUE CHECK PER ROW
    if(rule.condition.valueEquals){
        return norm(x.Value || "") === norm(rule.condition.valueEquals)
    }

    return true
});

/* 🔥 REMOVE DUPLICATE WALL ENTRIES */
let uniqueMap = new Map();

matches.forEach(x=>{
let key = (x.Walls || "")
.split(",")
.map(w=>w.trim())
.sort()
.join(","); // normalize
 
if(!uniqueMap.has(key)){
uniqueMap.set(key, x);
}
});

matches = Array.from(uniqueMap.values());
if(matches.length){
let res=rule.output(matches);
if(res)insights.push({
room: rm.trim(),
text: res,
type: rule.meta?.type || [],
category: rule.meta?.category || []
}); 
}
});
}

if(rule.type==="measurement"){
measData.forEach(m=>{
if(!m.Room) return;
let vals = [];

if(rule.condition && rule.condition.fields){
    vals = rule.condition.fields.map(f=>m[f]||null);
}

 
let res = null;

try{
    res = rule.output(vals,m);
}catch(e){
    console.error("Rule failed:", rule.id, e);
}
 
if(res) insights.push({
room:m.Room,
text:res,
type: rule.meta?.type || [],
category: rule.meta?.category || []
});
});
}

if(rule.type==="society"){
societyData.forEach(s=>{
if(!s.Value || s.Value.trim() === "") return;
/* QUESTION MATCH (MANDATORY) */
if(!norm(s.Question).includes(norm(rule.condition.questionIncludes))) return;

/* VALUE MATCH (ONLY IF PRESENT) */
if(rule.condition.valueEquals){

let actual = (s.Value || "").trim();
let expected = rule.condition.valueEquals.trim();

/* EXACT MATCH ONLY */
if(actual !== expected){
    return;
}
}
/* RUN RULE */
let res = rule.output(s);
if(res) insights.push({
room:"All",
text:res,
type: rule.meta?.type || [],
category: rule.meta?.category || []
});

});
}

});

return insights;
}

function getRoomOrthoSummary(m){

let wp1 = [m.wp1_c1, m.wp1_mid, m.wp1_c2].map(Number).filter(x=>x)
let wp2 = [m.wp2_c1, m.wp2_mid, m.wp2_c2].map(Number).filter(x=>x)

if(wp1.length !== 3 || wp2.length !== 3) return ""

let dev1 = Math.max(...wp1) - Math.min(...wp1)
let dev2 = Math.max(...wp2) - Math.min(...wp2)

let avg1 = (wp1[0] + wp1[1] + wp1[2]) / 3
let avg2 = (wp2[0] + wp2[1] + wp2[2]) / 3

let skew = Math.abs(avg1 - avg2)

let maxDev = Math.max(dev1, dev2, skew)

if(maxDev > 30) return "Room not orthogonal (>30 mm)"
if(maxDev > 20) return "Room not orthogonal (20–30 mm)"
if(maxDev > 5) return "Room slightly skewed (5–20 mm)"

return ""
}

)

}

function parseCustomDate(str){

if(!str) return null;

/* FORMAT: 14/04/2026, 02:51:26 */
let parts = str.split(",");
if(parts.length < 2) return null;

let datePart = parts[0].trim();   // 14/04/2026
let timePart = parts[1].trim();   // 02:51:26

let [day, month, year] = datePart.split("/");

return new Date(`${year}-${month}-${day}T${timePart}`);
}
