<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Validation Report Generator</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px}
.card{background:#fff;padding:20px;border-radius:10px;max-width:600px;margin:auto}
button{padding:10px 16px;background:#1e3d8f;color:white;border:none;border-radius:6px;margin-top:10px}
</style>
</head>

<body>

<div class="card">
<h2>Validation Report Generator</h2>

<input type="file" id="fileInput" accept=".xlsx" />
<br>
<button onclick="processFile()">Generate Report</button>

</div>

<script>

function processFile(){

let file = document.getElementById("fileInput").files[0]
if(!file){ alert("Upload file first"); return }

let reader = new FileReader()

reader.onload = function(e){

let data = new Uint8Array(e.target.result)
let wb = XLSX.read(data, {type:'array'})

let raw = XLSX.utils.sheet_to_json(wb.Sheets["Validation Data"])
let meas = XLSX.utils.sheet_to_json(wb.Sheets["Measurements"])

/* ---------------- PROJECT TAB ---------------- */

let ignoreCols = ["Room","Section","Item","Value","Walls","Comments"]

let project = {}
raw.forEach(r=>{
Object.keys(r).forEach(k=>{
if(!ignoreCols.includes(k) && !project[k]){
project[k] = r[k]
}
})
})

let projectSheet = [project]

/* ---------------- WALL MATRIX ---------------- */

let wallRows = raw.filter(r=>r.Section==="Wall")

let rooms = [...new Set(raw.map(r=>r.Room))]
let questions = [...new Set(wallRows.map(r=>r.Item))]

let wallMatrix = []

questions.forEach(q=>{
let row = {Question:q}

rooms.forEach(room=>{
let rec = wallRows.find(r=>r.Room===room && r.Item===q)

if(rec){
let val = rec.Value || ""
let wall = rec.Walls || ""
let com = rec.Comments || ""

row[room] = `${wall} | ${val} | ${com}`.trim()
}else{
row[room] = ""
}
})

wallMatrix.push(row)
})

/* ---------------- ROOM MATRIX ---------------- */

let roomRows = raw.filter(r=>r.Section==="Room")
let roomQuestions = [...new Set(roomRows.map(r=>r.Item))]

let roomMatrix = []

roomQuestions.forEach(q=>{
let row = {Question:q}

rooms.forEach(room=>{
let rec = roomRows.find(r=>r.Room===room && r.Item===q)

if(rec){
let val = rec.Value || ""
let com = rec.Comments || ""

row[room] = `${val} | ${com}`.trim()
}else{
row[room] = ""
}
})

roomMatrix.push(row)
})

/* ---------------- INSIGHTS ---------------- */

let insights = rooms.map(r=>({
Room:r,
Insights:""
}))

/* ---------------- MEASUREMENTS ---------------- */

let measurements = meas

/* ---------------- EXPORT ---------------- */

let newWB = XLSX.utils.book_new()

XLSX.utils.book_append_sheet(newWB, XLSX.utils.json_to_sheet(projectSheet), "Project & Society")
XLSX.utils.book_append_sheet(newWB, XLSX.utils.json_to_sheet(wallMatrix), "Wall Matrix")
XLSX.utils.book_append_sheet(newWB, XLSX.utils.json_to_sheet(roomMatrix), "Room Matrix")
XLSX.utils.book_append_sheet(newWB, XLSX.utils.json_to_sheet(insights), "Insights")
XLSX.utils.book_append_sheet(newWB, XLSX.utils.json_to_sheet(measurements), "Measurements")

XLSX.writeFile(newWB, "Validation_Report.xlsx")

}

reader.readAsArrayBuffer(file)

}

</script>

</body>
</html>
